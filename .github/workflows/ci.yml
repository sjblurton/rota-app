name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    runs-on: ubuntu-latest
    environment: test
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPERADMIN_API_KEY: ${{ secrets.SUPERADMIN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --workspace client

      - name: Test
        run: npm run test --workspace client

      - name: Lint
        run: npm run lint --workspace client

      - name: Type check
        run: npm run lint:typescript --workspace client

      - name: Build
        run: npm run build --workspace client
  server:
    runs-on: ubuntu-latest
    environment: test
    env:
      DATABASE_URL: postgresql://postgres:pass123@localhost:5432/rota_dev
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPERADMIN_API_KEY: ${{ secrets.SUPERADMIN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --workspace server
      - run: npm run db:generate --workspace server

      - name: Unit Tests
        run: npm run test --workspace server

      - name: Coverage Tests
        run: npm run test:coverage --workspace server

      - name: Check code quality
        run: npm run check:all --workspace server
  e2e:
    runs-on: ubuntu-latest
    environment: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass123
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:pass123@localhost:5432/postgres
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPERADMIN_API_KEY: ${{ secrets.SUPERADMIN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --workspace server
      - run: npm run db:generate --workspace server

      - name: E2E Tests
        run: npm run test:e2e --workspace server
