name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run lint:typescript

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  server:
    name: Server Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rota_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Load test environment
        run: |
          set -a
          source .env.test
          set +a

          {
            echo "NODE_ENV=$NODE_ENV"
            echo "DATABASE_URL=$DATABASE_URL"
            echo "SUPERADMIN_API_KEY=$SUPERADMIN_API_KEY"
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
            echo "POSTGRES_DB=$POSTGRES_DB"
          } >> "$GITHUB_ENV"

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Coverage
        run: npm run test:coverage
