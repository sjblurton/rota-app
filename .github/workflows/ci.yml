name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run lint:typescript

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  server:
    name: Server Checks
    runs-on: ubuntu-latest
    environment: test

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://d0d67a39c610bf989d39e62807e4b6b88f97652e5d7b7282f1bda92e00dde770:sk_OVDUtQ8AkzIyQQqzHReuY@db.prisma.io:5432/postgres?sslmode=require
      SUPERADMIN_API_KEY: test-secret-key

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass123
          POSTGRES_DB: rota_test

        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rota_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Coverage
        run: npm run test:coverage
